<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dollar_convert</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/tailwind.js"></script>
</head>

<body class="bg-gray-200 text-center">
    <main class="h-screen flex justify-center items-center">
        <form action="" class="flex flex-col w-[400px] p-5 rounded-lg bg-gray-300  gap-5">
            <h1 class="text-red-500 text-xl">Convert Dollar to LE</h1>
            <h2></h2>1 Dollar = 55 LE
            <input type="text" name="amount" placeholder="Enter Your Amount Of Dollars" class="border p-2.5"
                id="dollar">
            <h1 id="result"></h1>
            <button id="convert"
                class="border bg-green-500 p-3 rounded-lg text-white hover:bg-green-600 cursor-pointer">Convert to
                Egyption
                Pound</button>
        </form>
    </main>
    <script src="js/main.js"></script>
</body>

</html>
